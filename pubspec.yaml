name: hub_smart_games
description: Hub de jogos mobile com Snake, Torre de Hanói e rankings.
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.0.0
  
  # Local storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.0
  
  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.0.0
  cloud_firestore: ^5.0.0
  
  # Networking
  http: ^1.1.0
  
  # UI
  google_fonts: ^6.0.0
  lottie: ^2.4.0
  share_plus: ^10.1.0
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.0.0
  
  # Ads
  google_mobile_ads: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png
  adaptive_icon_background: "#090A0C"
  adaptive_icon_foreground: assets/logo.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  
  assets:
    - assets/logo.png
    - assets/images/
    - assets/animations/
    - assets/sounds/
